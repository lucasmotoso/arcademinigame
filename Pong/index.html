<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>PONG - Arcade Mini Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link href="pong.css" rel="stylesheet">
  <link rel="icon" href="../images/icon.png">
</head>
<body>

  <div id="game-container">
    <div class="game-header">
      <a href="../index.html" class="btn-back">← MENU</a>
      <h2>🏓 PONG</h2>
      <div class="header-controls">
        <label class="toggle-label">
          <input type="checkbox" id="sound-toggle">
          <span>🔊</span>
        </label>
      </div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="pongCanvas"></canvas>
    </div>

    <div id="touch-area">
      <div id="touch-left" class="touch-zone">
        <span class="touch-zone-label">P1</span>
      </div>
      <div id="touch-right" class="touch-zone">
        <span class="touch-zone-label">P2</span>
      </div>
    </div>

    <div class="game-instructions">
      <div class="instruction-row">
        <span class="key-group"><kbd>1</kbd> Solo</span>
        <span class="key-group"><kbd>2</kbd> Duo</span>
        <span class="key-group"><kbd>0</kbd> Demo</span>
        <span class="key-group"><kbd>Esc</kbd> Sair</span>
      </div>
      <div class="instruction-row">
        <span class="key-group">P1: <kbd>Q</kbd><kbd>A</kbd></span>
        <span class="key-group">P2: <kbd>P</kbd><kbd>L</kbd></span>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="pong.js"></script>
  <script>
  Game.ready(function() {
    var sound = document.getElementById('sound-toggle');

    var pong = Game.start('pongCanvas', Pong, {
      sound: sound.checked,
      stats: false,
      footprints: false,
      predictions: false
    });

    Game.addEvent(sound, 'change', function() { pong.enableSound(sound.checked); });
  });
  </script>
</body>
</html>
