<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>Sinuca 8 Ball - Arcade Mini Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../images/icon.png">
</head>
<body>
  <div id="game-container">
    <div class="game-header">
      <a href="../index.html" class="btn-back">← MENU</a>
      <h2>🎱 SINUCA 8 BALL</h2>
      <button id="btn-reset" class="btn-reset">↻ RESET</button>
    </div>

    <div class="game-info">
      <div class="info-row">
        <div class="score-box">
          <span class="score-label">PONTOS</span>
          <span id="current-score" class="score-value">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">BOLAS</span>
          <span id="balls-left" class="score-value">15</span>
        </div>
        <div class="score-box">
          <span class="score-label">RECORDE</span>
          <span id="best-score" class="score-value">0</span>
        </div>
      </div>
      <div class="controls-hint">
        <span>🖱️ Clique na bola branca e arraste para trás para mirar — solte para tacar</span>
      </div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="touch-controls">
      <p class="touch-hint">📱 Toque na bola branca e arraste para mirar e controlar a força</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
